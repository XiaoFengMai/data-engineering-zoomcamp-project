name: nyc_311_project       # name of dbt project 
version: 1.0            # project version number
config-version: 2       # configuration syntax version 2 is modern standard for dbt projects

profile: 'nyc_311_profile'    # notifies dbt of what database connection configuration to use

model-paths: ["models"]    # specifies the folder where dbt should look for SQL models

models:              # below is the structure showcasing how models are built 
  nyc_311_project:    # must match the project name above

    staging:
      materialized: view    # models inside models/staging become lightweight database viwws that reflect latest data 
                            # staging = view mirror raw data without heavy computation

    intermediate: mod
      materialized: view    # intermediate models also become views that contain logic and reusable transformations

    marts:
      materialized: table    # models in models/marts also become tables because dashboards query these often
      partition_by:                # splits tables by dates for faster querying and lower query cost
        field: created_date
        data_type: date
      cluster_by:                  # groups rows by borough and complaint type, speeds up dashboard fillers
        - borough
        - complaint_type
